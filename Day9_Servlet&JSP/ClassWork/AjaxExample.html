<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<style>
table {
	width: 70%;
	margin: 20px auto;
}

th, td {
	border: 2px solid grey;
	padding: 10px;
}
</style>
<script type="text/javascript">
	function passwordStrength() {
		var password = document.getElementById("pwd").value;
		var req = new XMLHttpRequest();
		req.open("GET",
				"http://localhost:8080/MyWebApplication/PasswordStrengthServlet?pwd="
						+ password);
		req.onreadystatechange = function() {
			if (req.readyState == 4 && req.status == 200) {
				document.getElementById("result").innerHTML = req.responseText;
			}
		};
		req.send();
	}

	function emailCheck() {
		var email = document.getElementById("email").value;
		var req = new XMLHttpRequest();
		req.open("GET",
				"http://localhost:8080/MyWebApplication/EmailCheckServlet?email="
						+ email);
		req.onreadystatechange = function() {
			if (req.readyState == 4 && req.status == 200) {
				document.getElementById("result1").innerHTML = req.responseText;
			}
		};
		req.send();
	}
</script>
</head>
<body>
	<table border="1">
		<tr>
			<th colspan="2">Registration Form</th>
		</tr>
		<tr>
			<td>Student Name</td>
			<td><input type="text" size="40"></td>
		</tr>

		<tr>
			<td>Father's Name</td>
			<td><input type="text" size="40"></td>
		</tr>

		<tr>
			<td>Mother's Name</td>
			<td><input type="text" size="40"></td>
		</tr>

		<tr>
			<td>Date of Birth</td>
			<td><input type="date"></td>
		</tr>

		<tr>
			<td>Gender</td>
			<td><input type="radio" name="gender" size="40">Male <input
				type="radio" name="gender" size="40">Female</td>
		</tr>

		<tr>
			<td>Email ID</td>
			<td><input type="email" value="Enter your email"
				onfocus="this.value=''" id="email" onblur="emailCheck()"/> <span id="result1"></span>
			</td>
		</tr>

		<tr>
			<td>Password</td>
			<td><input type="password" size="40" id="pwd"
				onkeyup="passwordStrength()"> <span id="result"></span></td>
		</tr>


		<tr>
			<td>Mobile Number</td>
			<td><input type="tel" size="40"></td>
		</tr>

		<tr>
			<td>Address</td>
			<td><textarea rows="4" cols="30" size="40"></textarea></td>
		</tr>

		<tr>
			<td>State</td>
			<td><input type="text" size="40"></td>
		</tr>

		<tr>
			<td>City</td>
			<td><input type="text" size="40"></td>
		</tr>

		<tr>
			<td></td>
			<td><input type="submit" value="Submit" size="40"></td>
		</tr>

	</table>
</body>
</html>
