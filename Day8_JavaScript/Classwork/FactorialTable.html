<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factorial Table</title>

<script>
	function factorial() {

		var n1 = parseInt(document.getElementById("n1").value);
		var fact = 1;
		var result = "<table border='1' width='40%'>";
		result += "<tr><th>Number</th><th>Factorial</th></tr>";

		if (n1 < 0) {
			document.getElementById("result").innerHTML = "Invalid Number";
			return;
		}

		for (var i = 1; i <= n1; i++) {
			fact = fact * i;
			result += "<tr><td>" + i + "</td><td>" + fact + "</td></tr>";
		}

		result += "</table>";

		document.getElementById("result").innerHTML = result;
	}
</script>

</head>
<body>

	Enter Number
	<input type="number" id="n1">

	<br>
	<br>

	<button onclick="factorial()">Factorial Table</button>

	<br>

	<div id="result"></div>

</body>
</html>
