<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DOM Manipulation</title>

<style>
.mystyle {
	color: red;
}
</style>

<script>
	function createDOM() {
		const myElement = document.getElementById("h1");
		myElement.textContent = "DOM Manipulation";
		myElement.setAttribute("id", "MyH1");
	}

	function updateDOM() {
		const myElement = document.getElementById("MyH1");
		myElement.textContent = "DOM Updated";
	}

	function changeDOMStyle() {
		const myElement = document.getElementById("MyH1");
		myElement.classList.add("mystyle");
	}

	function removeDOM() {
		const myElement = document.getElementById("MyH1");
		myElement.remove();
	}
</script>

</head>

<body>

	<h1 id="h1"></h1>

	<button onclick="createDOM()">Create DOM</button>
	<button onclick="updateDOM()">Update DOM</button>
	<button onclick="changeDOMStyle()">Change DOM Style</button>
	<button onclick="removeDOM()">Remove DOM</button>

</body>
</html>
