<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<link href="LoginStyle.css" rel="stylesheet"></link>
</head>
<body>
<div class = "logindiv">
	<table>
        <tr>
            <td>Username :</td>
            <td>
                <input type="text" name="username">
            </td>
        </tr>

        <tr>
            <td>Password :</td>
            <td>
                <input type="password" name="password">
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Login" class = "loginbutton">
            </td>
        </tr>
    </table>
</div>
</body>
</html>
