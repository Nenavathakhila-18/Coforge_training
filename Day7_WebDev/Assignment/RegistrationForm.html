<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<style>
table{
width:70%;
margin:20px auto;
}
th, td{
    border:2px solid grey;
    padding:10px;
}
</style>
</head>
<body>
	<table border="1">
		<tr>
    <th colspan="2">Registration Form</th>
</tr>
	<tr>
            <td>Student Name</td>
            <td>
                <input type="text" size="40">
            </td>
        </tr>
     
     <tr>
            <td>Father's Name</td>
            <td>
                <input type="text" size="40">
            </td>
        </tr>
        
        <tr>
            <td>Mother's Name</td>
            <td>
                <input type="text" size="40">
            </td>
        </tr>
        
         <tr>
            <td>Date of Birth </td>
            <td>
                <input type="date">
            </td>
        </tr>
        
        <tr>
            <td>Gender</td>
            <td>
               <input type="radio" name="gender" size="40">Male
			   <input type="radio" name="gender" size="40">Female
            </td>
        </tr>
        
        <tr>
            <td>Email ID</td>
            <td>
                <input type="email" size="40">
            </td>
        </tr>
        
        <tr>
            <td>Mobile Number</td>
            <td>
                <input type="tel" size="40">
            </td>
        </tr>
        
        <tr>
            <td>Address</td>
            <td>
                <textarea rows="4" cols="30" size="40"></textarea>
            </td>
        </tr>
        
         <tr>
            <td>State</td>
            <td>
                <input type="text" size="40">
            </td>
        </tr>
        
        <tr>
            <td>City</td>
            <td>
                <input type="text" size="40">
            </td>
        </tr>
        
        <tr>
    <td></td>
	    <td>
	        <input type="submit" value="Submit" size="40">
	    </td>
	</tr>
	
	</table>
</body>
</html>
